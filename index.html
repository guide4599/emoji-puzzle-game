<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>ศูนย์รวมมินิเกมของฉัน</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .menu-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            margin-top: 0; 
            font-size: 2.2em; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        p { 
            font-size: 1.1em; 
            color: #f0f0f0; 
            margin-bottom: 30px; 
        }
        
        .game-menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        
        .game-btn {
            display: block;
            width: 100%;
            box-sizing: border-box;
            background: linear-gradient(90deg, #ff8a00, #e52e71);
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px; 
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            -webkit-appearance: none;
        }
        
        .game-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 8px 25px rgba(229, 46, 113, 0.6);
        }

        .coming-soon {
            background: rgba(255, 255, 255, 0.15);
            color: #ddd;
            cursor: not-allowed;
            box-shadow: none;
        }

        .coming-soon:hover {
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>🎮 My Mini Games</h1>
        <p>ยินดีต้อนรับ! เลือกเกมที่ต้องการเล่นได้เลย</p>

        <div class="game-menu">
            <a href="emoji.html" class="game-btn">🧩 เกมจับคู่อีโมจิ</a>
            <a href="defense.html">เล่นเกมป้องกันฐาน (Mini Lane Defense)</a>
            <a href="#" class="game-btn coming-soon">🔜 เกมที่ 3 (เร็วๆ นี้)</a>
        </div>
    </div>

</body>
</html>
