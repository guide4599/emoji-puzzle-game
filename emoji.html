<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมจับคู่อีโมจิ | Memory Puzzle</title>
    <style>
        * { box-sizing: border-box; } /* ป้องกันกรอบล้น */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #f0f8ff; 
            margin: 0; 
            padding: 15px; /* ลดขอบลงให้เหมาะกับมือถือ */
            min-height: 100vh;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 22px; text-align: center; }
        
        .stats { 
            margin-bottom: 15px; 
            font-size: 18px; 
            color: #555; 
            background: white;
            padding: 8px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .moves { color: #e91e63; font-weight: bold; font-size: 22px; }
        
        /* ปรับกระดานให้ยืดหยุ่น ยืดหดตามจอมือถืออัตโนมัติ */
        .game-board { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* แบ่งเป็น 4 ช่องเท่าๆ กันเสมอ */
            gap: 8px; 
            width: 100%;
            max-width: 360px; /* ไม่ให้ใหญ่เกินไปในจอคอม */
            margin-bottom: 25px;
        }
        
        .card { 
            width: 100%; 
            aspect-ratio: 1 / 1; /* บังคับให้ไพ่เป็นสี่เหลี่ยมจัตุรัสเสมอ */
            background-color: #ff5722; 
            border-radius: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 2rem; /* ขนาดอีโมจิปรับตามจอ */
            cursor: pointer; 
            color: transparent; 
            transition: transform 0.2s, background-color 0.3s; 
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            -webkit-tap-highlight-color: transparent; /* เอาแถบสีฟ้าตอนกดในมือถือออก */
        }
        
        .card:active { transform: scale(0.95); }
        .card.flipped { background-color: #fff; color: #000; cursor: default; }
        .card.matched { background-color: #ffeb3b; color: #000; cursor: default; animation: pop 0.3s ease; }
        
        .action-buttons {
            display: flex;
            gap: 10px; 
            margin-bottom: 15px;
            width: 100%;
            max-width: 360px;
            justify-content: center;
        }

        button, .home-btn { 
            flex: 1; /* ให้ปุ่มกว้างเท่าๆ กัน */
            padding: 12px 10px; 
            font-size: 15px; 
            font-weight: bold;
            text-align: center;
            cursor: pointer; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            -webkit-appearance: none; /* บังคับ iOS ไม่ให้เปลี่ยนสไตล์ปุ่ม */
        }
        button { background-color: #2196F3; }
        .home-btn { background-color: #607D8B; display: flex; justify-content: center; align-items: center; }

        .visitor-counter {
            margin-top: 10px;
            text-align: center;
            background-color: white;
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>🧩 เกมจับคู่อีโมจิ 🧩</h1>
    <div class="stats">
        เปิดไพ่: <span id="moves" class="moves">0</span> ครั้ง
    </div>
    
    <div class="game-board" id="game-board"></div>
    
    <div class="action-buttons">
        <button onclick="initGame()">🔄 เริ่มใหม่</button>
        <a href="index.html" class="home-btn">🏠 เมนูหลัก</a>
    </div>

<img src="https://api.visitorbadge.io/api/visitors?path=https%3A%2F%2Fguide4599.github.io%2Femoji-puzzle-game&label=VIEWS&labelColor=%23555555&countColor=%232196F3" alt="Visitor Count">
    <script>
        const emojis = ['🐶', '🐱', '🐭', '🐰', '🦊', '🐻', '🐼', '🐸', '🐯', '🦁', '🐮', '🐷'];
        let cards = [...emojis, ...emojis]; 
        let moves = 0;
        let flippedCards = [];
        let matchedPairs = 0;
        let isLocked = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initGame() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            shuffle(cards);
            moves = 0;
            matchedPairs = 0;
            flippedCards = [];
            isLocked = false;
            
            document.getElementById('moves').innerText = moves;

            cards.forEach((emoji) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.emoji = emoji;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (isLocked || this.classList.contains('flipped') || this.classList.contains('matched')) return;

            this.classList.add('flipped');
            this.innerText = this.dataset.emoji;
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').innerText = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            isLocked = true; 
            const [card1, card2] = flippedCards;

            if (card1.dataset.emoji === card2.dataset.emoji) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                flippedCards = [];
                isLocked = false;

                if (matchedPairs === emojis.length) {
                    setTimeout(() => {
                        alert(`🎉 ยินดีด้วย! คุณใช้การเปิดไพ่ไปทั้งหมด: ${moves} ครั้ง`);
                    }, 500);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.innerText = '';
                    card2.innerText = '';
                    flippedCards = [];
                    isLocked = false;
                }, 600); 
            }
        }

        initGame();
    </script>
</body>
</html>
