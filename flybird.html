<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>เกม Flappy Bird</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #2c3e50; 
            margin: 0; 
            padding: 10px; 
            min-height: 100vh;
            color: white;
        }
        h1 { margin: 10px 0; font-size: 24px; text-align: center; color: #ecf0f1; }
        
        .score-board { 
            font-size: 22px; 
            font-weight: bold; 
            background: #e74c3c; 
            padding: 5px 20px; 
            border-radius: 20px; 
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* ส่วนของหน้าจอเกม */
        canvas {
            background-color: #70c5ce; /* สีฟ้าท้องฟ้า */
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            max-width: 100%;
            height: auto;
            touch-action: none; /* ห้ามมือถือซูมหรือเลื่อนจอตอนแตะเล่น */
            cursor: pointer;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px; 
            margin-top: 20px;
            width: 100%;
            max-width: 320px;
        }

        button, .home-btn { 
            flex: 1; 
            padding: 12px 10px; 
            font-size: 16px; 
            font-weight: bold;
            text-align: center;
            cursor: pointer; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button { background-color: #f39c12; display: none; } /* ซ่อนปุ่มเริ่มใหม่ไว้ก่อน */
        .home-btn { background-color: #7f8c8d; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <h1>🦅 นกน้อยพาเพลิน 🦅</h1>
    <div class="score-board">คะแนน: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="320" height="460"></canvas>
    
    <div class="action-buttons">
        <button id="restartBtn">🔄 เริ่มเล่นใหม่</button>
        <a href="index.html?v=2" class="home-btn">🏠 กลับเมนูหลัก</a>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const restartBtn = document.getElementById("restartBtn");
        const scoreElement = document.getElementById("score");

        let frames = 0;
        let score = 0;
        let gameState = "START"; // สถานะเกม: START, PLAYING, GAMEOVER

        // ตัวละครนก
        const bird = {
            x: 60, y: 150, radius: 12,
            velocity: 0, gravity: 0.25, jump: -4.8,
            draw() {
                ctx.fillStyle = "#FFC107"; // สีเหลือง
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#000";
                ctx.stroke();
                
                // วาดตาให้นกนิดนึง
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(this.x + 4, this.y - 4, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "black";
                ctx.beginPath();
                ctx.arc(this.x + 5, this.y - 4, 2, 0, Math.PI * 2);
                ctx.fill();
            },
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;
                
                // ชนพื้น หรือ ชนเพดาน
                if (this.y + this.radius >= canvas.height || this.y - this.radius <= 0) {
                    gameState = "GAMEOVER";
                }
            },
            flap() {
                this.velocity = this.jump;
            }
        };

        // ท่ออุปสรรค
        const pipes = {
            items: [],
            width: 50, gap: 110, dx: 2, // gap คือความกว้างของช่องว่างที่ให้ลอดผ่าน
            draw() {
                ctx.fillStyle = "#2ecc71"; // สีเขียว
                for (let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];
                    ctx.fillRect(p.x, 0, this.width, p.top); // ท่อบน
                    ctx.fillRect(p.x, canvas.height - p.bottom, this.width, p.bottom); // ท่อล่าง
                    
                    // วาดขอบท่อ
                    ctx.strokeStyle = "#27ae60";
                    ctx.strokeRect(p.x, 0, this.width, p.top);
                    ctx.strokeRect(p.x, canvas.height - p.bottom, this.width, p.bottom);
                }
            },
            update() {
                // สร้างท่อใหม่ทุกๆ 100 เฟรม
                if (frames % 100 === 0) {
                    let topHeight = Math.max(30, Math.random() * (canvas.height - this.gap - 60));
                    let bottomHeight = canvas.height - topHeight - this.gap;
                    this.items.push({ x: canvas.width, top: topHeight, bottom: bottomHeight, passed: false });
                }
                
                for (let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];
                    p.x -= this.dx; // เลื่อนท่อไปทางซ้าย

                    // ตรวจสอบการชนท่อ
                    if (bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + this.width) {
                        if (bird.y - bird.radius < p.top || bird.y + bird.radius > canvas.height - p.bottom) {
                            gameState = "GAMEOVER";
                        }
                    }

                    // นับคะแนนเมื่อผ่านท่อ
                    if (p.x + this.width < bird.x && !p.passed) {
                        score++;
                        p.passed = true;
                        scoreElement.innerText = score;
                    }

                    // ลบท่อที่ลอยออกนอกจอไปแล้ว
                    if (p.x + this.width < 0) {
                        this.items.shift();
                        i--;
                    }
                }
            },
            reset() {
                this.items = [];
            }
        };

        function draw() {
            // ล้างหน้าจอด้วยสีท้องฟ้า
            ctx.fillStyle = "#70c5ce"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            pipes.draw();
            bird.draw();

            if (gameState === "START") {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 20px Tahoma";
                ctx.textAlign = "center";
                ctx.fillText("แตะหน้าจอเพื่อกระโดด", canvas.width / 2, canvas.height / 2);
            }

            if (gameState === "GAMEOVER") {
                ctx.fillStyle = "rgba(255,0,0,0.2)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "red";
                ctx.font = "bold 35px Tahoma";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                restartBtn.style.display = "block"; // โชว์ปุ่มเริ่มใหม่
            }
        }

        function update() {
            if (gameState === "PLAYING") {
                bird.update();
                pipes.update();
            }
        }

        function loop() {
            update();
            draw();
            frames++;
            if (gameState !== "GAMEOVER") {
                requestAnimationFrame(loop);
            }
        }

        // ระบบควบคุมการกระโดด
        function jump() {
            if (gameState === "START") {
                gameState = "PLAYING";
            }
            if (gameState === "PLAYING") {
                bird.flap();
            }
        }

        // แตะจอคอม (เมาส์) หรือจอมือถือ
        canvas.addEventListener("mousedown", jump);
        canvas.addEventListener("touchstart", function(e) { 
            e.preventDefault(); // กันจอมือถือซูมตอนกดรัวๆ
            jump(); 
        }, {passive: false});

        // ปุ่มเริ่มใหม่
        restartBtn.addEventListener("click", () => {
            bird.y = 150;
            bird.velocity = 0;
            pipes.reset();
            score = 0;
            scoreElement.innerText = score;
            gameState = "START";
            restartBtn.style.display = "none";
            loop();
        });

        // เริ่มรันเกม
        loop();
    </script>
</body>
</html>
