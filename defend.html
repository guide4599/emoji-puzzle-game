<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal Defender | เกมป้องกันฐาน</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #1a1a2e; /* สีพื้นหลังโทนมืด */
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; 
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }
        .hp-bar { color: #00d2d3; text-shadow: 0 0 5px #00d2d3; margin-bottom: 5px; }
        .score-bar { color: #feca57; text-shadow: 0 0 5px #feca57; }
        
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ff6b6b;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
            z-index: 20;
            width: 80%;
            max-width: 300px;
        }
        #game-over h1 { margin: 0 0 10px 0; color: #ff6b6b; }
        
        .btn {
            display: block;
            width: 100%;
            margin-top: 15px;
            padding: 12px 0;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: #ff6b6b;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
        }
        #home-btn { background: #576574; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="hp-bar">🛡️ พลังงานฐาน: <span id="hp">100</span>%</div>
        <div class="score-bar">⚔️ กำจัดศัตรู: <span id="score">0</span> ตัว</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="game-over">
        <h1>💥 ฐานแตก! 💥</h1>
        <p>คุณปกป้องฐานและกำจัดศัตรูไปได้<br><b style="font-size: 24px; color: #feca57;"><span id="final-score">0</span></b> ตัว</p>
        <button class="btn" onclick="resetGame()">🔄 ป้องกันฐานอีกครั้ง</button>
        <a href="index.html" class="btn" id="home-btn">🏠 กลับเมนูหลัก</a>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // ปรับขนาดจอให้เต็มมือถือ
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ตัวแปรระบบเกม
        let score = 0;
        let baseHp = 100;
        let gameActive = true;
        let frames = 0;

        // ข้อมูลคริสตัล (ฐานของเรา)
        const base = {
            x: canvas.width / 2,
            y: canvas.height - 40,
            radius: 35
        };

        let bullets = [];
        let enemies = [];
        let particles = [];

        // ฟังก์ชันยิงกระสุน
        function shoot(e) {
            if (!gameActive) return;
            
            // หาพิกัดที่นิ้วแตะ
            let touchX = e.clientX || (e.touches && e.touches[0].clientX);
            let touchY = e.clientY || (e.touches && e.touches[0].clientY);

            // คำนวณมุมยิงจากฐานไปยังจุดที่แตะ
            let angle = Math.atan2(touchY - base.y, touchX - base.x);
            
            bullets.push({
                x: base.x,
                y: base.y,
                vx: Math.cos(angle) * 12, // ความเร็วกระสุน
                vy: Math.sin(angle) * 12,
                radius: 5,
                color: '#00d2d3' // สีกระสุนเวทมนตร์
            });
        }

        window.addEventListener("mousedown", shoot);
        window.addEventListener("touchstart", (e) => { e.preventDefault(); shoot(e); }, {passive: false});

        // ฟังก์ชันสร้างศัตรู
        function spawnEnemy() {
            // เกิดแบบสุ่มจากขอบจอด้านบน ซ้าย หรือขวา
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() * canvas.width;
                y = -30; // เกิดด้านบน
            } else {
                x = Math.random() < 0.5 ? -30 : canvas.width + 30; // เกิดซ้ายขวา
                y = Math.random() * (canvas.height / 2);
            }

            // คำนวณให้เดินพุ่งเข้าหาฐานเสมอ
            let angle = Math.atan2(base.y - y, base.x - x);
            // ยิ่งคะแนนเยอะ ศัตรูยิ่งเดินเร็ว
            let speed = 1.2 + (score * 0.05);
            
            enemies.push({
                x: x, y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: 12,
                color: '#ff6b6b' // สีศัตรูมินเนี่ยน
            });
        }

        // เอฟเฟกต์ระเบิดตอนศัตรูตาย
        function createExplosion(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    life: 1.0,
                    color: color
                });
            }
        }

        // ลูปหลักของเกม
        function update() {
            if (!gameActive) return;

            // ล้างหน้าจอ
            ctx.fillStyle = "#1a1a2e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // วาดฐาน (คริสตัล)
            ctx.beginPath();
            ctx.arc(base.x, base.y, base.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#0984e3";
            ctx.fill();
            // แสงออร่ารอบฐาน
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#00d2d3";
            ctx.arc(base.x, base.y, base.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; // ล้างแสง

            // อัปเดตกระสุน
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();

                // ลบกระสุนที่ลอยออกนอกจอ
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                }
            }

            // อัปเดตศัตรู
            if (frames % Math.max(20, 80 - Math.floor(score/2)) === 0) {
                spawnEnemy(); // ศัตรูเกิดถี่ขึ้นเรื่อยๆ
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.x += e.vx;
                e.y += e.vy;

                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fillStyle = e.color;
                ctx.fill();

                // เช็คศัตรูชนฐาน
                let distToBase = Math.hypot(e.x - base.x, e.y - base.y);
                if (distToBase < e.radius + base.radius) {
                    baseHp -= 10;
                    document.getElementById('hp').innerText = Math.max(0, baseHp);
                    createExplosion(e.x, e.y, e.color);
                    enemies.splice(i, 1);
                    
                    // กระพริบจอแดงตอนโดนตี
                    ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    if (baseHp <= 0) {
                        gameActive = false;
                        document.getElementById('game-over').style.display = 'block';
                        document.getElementById('final-score').innerText = score;
                    }
                    continue;
                }

                // เช็คกระสุนโดนศัตรู
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let distToBullet = Math.hypot(e.x - b.x, e.y - b.y);
                    if (distToBullet < e.radius + b.radius) {
                        createExplosion(e.x, e.y, e.color);
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                        break;
                    }
                }
            }

            // อัปเดตเอฟเฟกต์ระเบิด
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.globalAlpha = p.life;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill
